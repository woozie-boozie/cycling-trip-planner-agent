description: |-
  Loire à Vélo — the canonical signposted EuroVelo 6 western segment. ~800 km of mostly flat, dedicated cycle paths along France's longest river, through vineyards, châteaux country, and gentle Atlantic-coast finale. The flattest 800 km of any EV6 segment.
variants:
- name: ev6_loire
  title: EuroVelo 6 Loire — the canonical signposted path
  headline_tag: Direct
  is_default: true
  description: |-
    The fully signposted EuroVelo 6 from Nevers via Sancerre, Orléans, Blois, Tours, Saumur, Angers and Nantes to the Atlantic at Saint-Brevin-les-Pins.
  distinguishing_features:
  - Flattest 800 km of any EuroVelo 6 segment
  - Vineyard + château villages every 30-40 km
  - Loire river views for ~60% of the ride
  - Mostly dedicated traffic-free cycle paths
  trade_offs:
  - Tourist-heavy in July/August around the major châteaux
  - Some sections traffic-shared near Tours and Nantes
  best_for: first-time multi-day tourers wanting flat + scenic + signposted
