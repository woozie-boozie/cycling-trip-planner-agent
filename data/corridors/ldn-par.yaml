id: ldn-par
label: London → Paris
start: London
end: Paris
aliases:
- london
- paris
- avenue verte
- ldn par
- london to paris
description: |-
  The signposted Avenue Verte from London to Paris via the Newhaven–Dieppe ferry. Three variants — V16a Beauvais (fastest), Oise/Chantilly (scenic châteaux loop), and Gisors (quiet western Epte valley). All share the same UK side from London via East Grinstead and Lewes to Newhaven.
variants:
- name: v16a_beauvais
  title: V16a Beauvais — fastest signposted
  headline_tag: Direct
  is_default: true
  description: |-
    The most direct of the signposted Avenue Verte variants. Crosses the Pays de Bray to Beauvais (UNESCO Gothic cathedral, tallest choir vault in the world), then drops to Cergy via Beaumont-sur-Oise.
  distinguishing_features:
  - Beauvais Cathedral (tallest Gothic choir vault, 48 m)
  - Pays de Bray cheese country (Neufchâtel AOC)
  - Mostly disused railway path on French side — gentle gradients
  - Shortest of the three Avenue Verte variants
  trade_offs:
  - Misses the Senlis/Chantilly chateaux loop
  - More A-road sections in the UK approach to East Grinstead
  best_for: targeting the fastest signposted crossing with one cathedral stop
