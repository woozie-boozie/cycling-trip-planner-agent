- name: oise_chantilly
  title: Oise/Chantilly — scenic chateaux loop
  headline_tag: Heritage
  description: |-
    Adds the Senlis (medieval town) + Chantilly (chateau, racecourse, lace) detour after Beauvais. ~20–30 km longer than V16a but the most photogenic variant — three world-class historic stops.
  distinguishing_features:
  - Chantilly Château + Grand Stables (one of France's finest)
  - Senlis medieval old town with intact Gallo-Roman walls
  - Beauvais Cathedral retained
  - Forest of Chantilly cycle paths
  trade_offs:
  - 20–30 km longer than V16a (one extra day for casual riders)
  - Chantilly + Senlis can be expensive for food and accommodation
  best_for: |-
    riders prioritising heritage + photography over distance, or honeymoon/special-occasion trips
