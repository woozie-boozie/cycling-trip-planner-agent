- name: gisors_western
  title: Gisors — western Epte valley
  headline_tag: Quiet
  description: |-
    Skips Beauvais entirely. From Gournay-en-Bray, drops south via Gisors (12th-century keep, William the Conqueror history) and the Epte valley to the Seine. Quieter, more rural, fewer tourists.
  distinguishing_features:
  - Gisors medieval keep (Knights Templar history)
  - Epte valley — the historic Norman/French frontier
  - Vexin Français Regional Natural Park
  - Far fewer tourists than the Beauvais/Chantilly variants
  trade_offs:
  - No Beauvais Cathedral
  - More rural — food + accommodation density lower
  - Rougher signposting in places (V32 + local cycle network)
  best_for: |-
    experienced tourers wanting solitude + rural Normandy/Vexin over headline tourist stops
