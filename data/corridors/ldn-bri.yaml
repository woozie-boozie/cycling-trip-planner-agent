- name: avenue_verte_lewes
  title: Avenue Verte UK + Lewes — South Downs detour
  headline_tag: Scenic
  description: |-
    Follows the Avenue Verte UK signposted route via East Grinstead, Forest Row, Lewes — adding the South Downs scenic spur and the historic county town of Lewes (Anne of Cleves' house, castle). Brighton arrival via the South Downs Way.
  distinguishing_features:
  - Forest of Ashdown (Winnie-the-Pooh country)
  - Lewes — Tudor architecture, castle, real-ale pubs
  - South Downs ridge approach to Brighton
  - Quieter than NCN 20 — lower traffic on Sussex lanes
  trade_offs:
  - 10–20 km longer than NCN 20
  - More climbing (Ashdown Forest + South Downs ridge)
  - Less signposting on the Lewes→Brighton spur
  best_for: |-
    riders wanting a proper 2-day trip with a Lewes overnight, or those who care more about countryside than the canonical route
