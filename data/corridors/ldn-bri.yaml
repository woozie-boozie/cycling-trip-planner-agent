description: |-
  The canonical British day-ride or weekend tour. Two variants — NCN 20 signposted (the BHF charity ride route via the Cuckoo Trail and Ditchling Beacon), and the Avenue Verte UK + Lewes detour (adds South Downs scenery and a Lewes overnight, ~10–20 km longer).
variants:
- name: ncn20
  title: NCN 20 signposted — fastest
  headline_tag: Direct
  is_default: true
  description: |-
    The classic National Cycle Network 20 route, the standard London→Brighton signposted ride. Ridden by ~30,000 cyclists every June for the British Heart Foundation event.
  distinguishing_features:
  - Wandle Trail through south London
  - Cuckoo Trail disused railway in East Sussex
  - Ditchling Beacon climb (the famous final ascent)
  - Best signposting of any UK cycle route
  trade_offs:
  - Urban south London first 25 km can feel stop-start
  - Brighton seafront finish but no Lewes/South Downs detour
  best_for: the canonical day-ride or a fast 2-day weekend; charity riders
