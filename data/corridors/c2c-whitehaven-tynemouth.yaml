description: |-
  Coast to Coast (C2C) — Britain's most-ridden multi-day challenge. ~225 km from the Irish Sea (Whitehaven) over the Pennines to the North Sea (Tynemouth). Doable in 3-5 days, signposted as NCN 7/14.
variants:
- name: c2c_classic
  title: C2C classic — Whitehaven to Tynemouth via Penrith
  headline_tag: Direct
  is_default: true
  description: |-
    The classic NCN 7 + NCN 14 routing from the Cumbrian coast via Keswick, Penrith and the North Pennines to Newcastle and Tynemouth. Includes the Hartside climb.
  distinguishing_features:
  - Britain's most-ridden multi-day challenge
  - Lake District scenery on day 1-2
  - Hartside Pass — the headline climb (~580 m at the top)
  - Disused railway paths (Waskerley Way) on the eastern half
  trade_offs:
  - Hartside climb is a real challenge — not flat
  - Western Lake District weather can be wet even in summer
  best_for: |-
    intermediate-and-up riders wanting a proper UK challenge in under a week
