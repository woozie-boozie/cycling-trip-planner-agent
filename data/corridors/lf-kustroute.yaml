description: |-
  LF Kustroute — the entire Dutch North Sea coast in one signposted route. ~570 km of dunes, beaches, and seaside towns from Den Helder in the north to the Belgian border at Cadzand. Pure flat, occasional dune climbs, headwinds the constant companion.
variants:
- name: lf_kustroute
  title: LF Kustroute — the full Dutch coast
  headline_tag: Coastal
  is_default: true
  description: |-
    The fully signposted LF Kustroute (LF1 + LF12) along the Dutch North Sea coast from the Wadden Sea to the Western Scheldt — dune paths, beach towns, ferry crossings at the river deltas.
  distinguishing_features:
  - Dune cycle paths most of the way — traffic-free and scenic
  - Multiple short ferry crossings at river-mouth deltas
  - Beach swimming at every overnight stop
  - Hoek van Holland ferry connects to UK if extending the trip
  trade_offs:
  - Constant westerly headwinds — plan north-to-south for tailwind
  - Limited inland alternatives if the coast gets stormy
  - Tourist crowds in Scheveningen / Zandvoort in July/August
  best_for: |-
    riders who want pure coast + tailwind plans, beach swimmers, Wadden Sea ecology enthusiasts
