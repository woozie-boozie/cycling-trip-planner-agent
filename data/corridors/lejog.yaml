description: |-
  LEJOG — the iconic UK end-to-end. ~1,600 km from Cornwall's south-westernmost point to the north-eastern Scottish tip. The most famous long-distance cycling challenge in Britain; every cyclist's bucket-list traverse.
variants:
- name: lejog_ncn
  title: LEJOG — the classic NCN-signposted route
  headline_tag: Direct
  is_default: true
  description: |-
    The most-ridden LEJOG path — NCN 3 from Land's End north via Exeter, Bristol, Birmingham, Manchester and Carlisle to Scotland, then NCN 7/1 via Glasgow and Inverness to John o' Groats. 14-21 days at 80-120 km/day.
  distinguishing_features:
  - The bucket-list British end-to-end traverse
  - Crosses every climate band the UK has — Cornwall to Caithness
  - NCN signposting on most segments
  - Major-city overnight options if you need bike shops mid-trip
  trade_offs:
  - 1,600 km is a serious commitment — average ~14 days at 110 km/day
  - Some A-road sections are unavoidable in remoter Scottish stretches
  - Headwind risk on the Scottish leg from west-coast prevailing winds
  best_for: |-
    experienced multi-day tourers; once-in-a-lifetime UK trips; charity-fundraising rides
