description: |-
  Amsterdam → Berlin — the European capital-to-capital ride. ~580 km via Utrecht, Münster, Hannover and Magdeburg. Mostly flat, mix of Dutch LF paths and German Radwege. 6-8 days at intermediate pace.
variants:
- name: amsterdam_berlin_classic
  title: Amsterdam → Berlin — Dutch LF + German Radwege
  headline_tag: Direct
  is_default: true
  description: |-
    The mostly-signposted capital-to-capital route from Amsterdam via Utrecht and Arnhem into Germany, then through Münster, Hannover, Magdeburg to Berlin. Mix of dedicated cycle paths and quiet country roads.
  distinguishing_features:
  - Two of Europe's flagship cycling capitals as start + end
  - Münsterland — Germany's most-cycled rural region
  - Magdeburg + Hannover for mid-trip bike-shop density
  - Mostly flat throughout — no real climbs
  trade_offs:
  - Signposting varies — Dutch LF excellent, German Radwege patchier
  - 580 km in a week is steady going — not a holiday pace
  best_for: |-
    European capital-collectors, riders extending a Berlin tour west into NL, week-long intermediate tourers
