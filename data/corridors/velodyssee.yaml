description: |-
  La Vélodyssée — France's longest signposted cycle route. ~1,200 km of Atlantic coast from Brittany to the Spanish border, EuroVelo 1's French segment. Pine forest paths, Bordeaux wine country detour, surf towns, Basque coast finish.
variants:
- name: velodyssee_full
  title: La Vélodyssée — full Atlantic-coast traverse
  headline_tag: Coastal
  is_default: true
  description: |-
    The full signposted Vélodyssée from the Brittany ferry port of Roscoff to the Spanish border at Hendaye. Includes the Nantes-Brest canal section, the Landes pine forest cycle paths, and the Basque-country coastal finale.
  distinguishing_features:
  - Longest signposted French cycle route
  - Landes pine forests — 200 km of dedicated traffic-free paths
  - Surf towns (Lacanau, Hossegor) for off-bike rest days
  - Crosses into Spain at Hendaye if extending to San Sebastián
  trade_offs:
  - 12+ days at 100 km/day — significant time commitment
  - 'Atlantic-side weather: cool summer evenings, frequent fog'
  - Pine-forest sections can feel monotonous after Day 4
  best_for: |-
    experienced multi-day tourers wanting a flagship French tour, Basque-coast riders, surfers cycling between breaks
