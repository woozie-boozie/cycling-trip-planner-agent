description: |-
  EuroVelo 15 — the full Rhine from the Swiss source town of Andermatt to the North Sea at Hook of Holland. ~1,230 km through Switzerland, France, Germany and the Netherlands. One of EuroVelo's signature long-distance corridors.
variants:
- name: ev15_rhine_full
  title: EuroVelo 15 Rhine — source-to-sea full traverse
  headline_tag: Scenic
  is_default: true
  description: |-
    The fully-signposted EuroVelo 15 from the Alps source at Andermatt down through Basel, Strasbourg, the German Rhine Gorge UNESCO area, Cologne and Nijmegen to Hook of Holland. 12-14 days at 100 km/day.
  distinguishing_features:
  - Rhine Gorge UNESCO World Heritage section (Mainz → Koblenz)
  - Four-country traverse with three currency zones
  - Strasbourg, Cologne, Mainz — major heritage stops
  - |-
    Pancake-flat from Basel northwards — descent from the Alps does the work
  trade_offs:
  - Big-river barge traffic + industrial sections south of Cologne
  - 12+ days is a serious commitment
  - Crowded with cruise-boat tourists between Koblenz and Mainz
  best_for: |-
    experienced long-distance tourers, EuroVelo enthusiasts, riders ticking off the iconic European cycling routes
