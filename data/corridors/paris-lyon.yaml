description: |-
  Paris → Lyon via the Burgundy canals — France's other headline corridor. ~500 km via Sens, Auxerre, Dijon and Beaune. Burgundy wine country, canal towpaths, châteaux, and gastronomic legend en route.
variants:
- name: paris_lyon_bourgogne
  title: Paris → Lyon — via the Burgundy canals
  headline_tag: Heritage
  is_default: true
  description: |-
    Cycling-friendly canal-towpath corridor from Paris via the Yonne and Burgundy canals to Dijon and the Côte d'Or wine villages, then south to Mâcon and Lyon. Mostly flat with vineyard climbs around Beaune.
  distinguishing_features:
  - Burgundy Grand Cru wine villages — Beaune, Pommard, Meursault
  - Canal towpaths for ~70% of the trip — traffic-free, flat
  - Dijon mustard + Burgundy beef + Mâcon Chardonnay region
  - Lyon as a finish — France's gastronomic capital
  trade_offs:
  - Côte d'Or vineyard sections have real short climbs
  - Towpath surfaces vary — some unpaved, gravel-bike preferred
  - Cellar tastings can shorten cycling time considerably
  best_for: |-
    wine + food tourists, gravel-bike riders, week-long France-deep-cut tours
