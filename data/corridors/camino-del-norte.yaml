description: |-
  Camino del Norte — the northern Camino de Santiago, rideable as a cycle pilgrimage. ~825 km along Spain's Atlantic coast through Basque country, Cantabria, Asturias and Galicia. The greener, hillier alternative to the Camino Francés.
variants:
- name: camino_norte_cycle
  title: Camino del Norte — Atlantic-coast pilgrimage by bike
  headline_tag: Scenic
  is_default: true
  description: |-
    The cycleable variant of the Northern Camino from Irún at the French border to Santiago de Compostela. Follows the Bay of Biscay coast, then turns inland through Galicia.
  distinguishing_features:
  - Atlantic-coast scenery vs the dry meseta of the Camino Francés
  - Pilgrim infrastructure — albergues every 25-40 km, cyclist-priced
  - Basque + Asturian + Galician food regions in one trip
  - Compostela certificate at journey's end (200 km minimum by bike)
  trade_offs:
  - Hillier than the Francés — Asturias has real climbing days
  - Rainier than the Francés — Atlantic coast weather
  - Less waymarking than the Francés in places
  best_for: |-
    pilgrim-cyclists wanting the scenic alternative; Atlantic + green Spain enthusiasts; experienced tourers
