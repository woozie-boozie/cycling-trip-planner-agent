description: |-
  Costa Brava — Catalonia's wild coast. ~280 km from Barcelona north along the Mediterranean via Tossa de Mar, Palamós and Cadaqués to the rocky finale at Cap de Creus. Mix of beach towns and Dalí country.
variants:
- name: costa_brava_coast
  title: Costa Brava coast — Barcelona to Cap de Creus
  headline_tag: Coastal
  is_default: true
  description: |-
    Coastal route from Barcelona via the Maresme then Tossa, Palamós, L'Escala and Cadaqués to Cap de Creus — Europe's easternmost point of the Iberian peninsula.
  distinguishing_features:
  - Wild Mediterranean coves between Tossa and Palamós
  - Cadaqués — Dalí's coastal village
  - Cap de Creus — easternmost point of mainland Spain
  - Beach swimming + tapas + Catalan wine every overnight
  trade_offs:
  - Coastal road traffic between Barcelona and Blanes
  - July/August tourist density, especially around Tossa
  - Final 30 km to Cap de Creus has serious short climbs
  best_for: |-
    Mediterranean lovers, Dalí enthusiasts, riders wanting a short 5-day coastal trip with a dramatic finish
