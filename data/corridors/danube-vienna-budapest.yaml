description: |-
  Donauradweg east — Vienna to Budapest via Bratislava and Győr. ~330 km, ~5 days, the natural continuation if you've already done Passau → Vienna. Three capital cities in one tour, mostly flat, signposted both banks.
variants:
- name: donauradweg_east
  title: Donauradweg east — Vienna → Budapest via Bratislava
  headline_tag: Direct
  is_default: true
  description: |-
    The continuation of EuroVelo 6 east from Vienna through Slovakia (Bratislava) and Hungary (Győr, Esztergom) to Budapest. Excellent for week-long ride at 70-80 km/day.
  distinguishing_features:
  - Three capital cities (Vienna, Bratislava, Budapest) in one tour
  - Esztergom Basilica — one of the largest churches in Europe
  - Hungarian thermal baths every overnight
  - Mostly flat both-bank cycle paths
  trade_offs:
  - Hungarian sections less signposted than Austrian
  - Currency change at the Slovak/Hungarian borders
  best_for: |-
    riders extending a Passau → Vienna trip, capital-city collectors, Central European history enthusiasts
