description: |-
  Sicily coastal loop — the full island circumnavigation by bike. ~750 km via Cefalù, Messina, Taormina, Catania, Syracuse, Ragusa, Agrigento and Trapani back to Palermo. Mt Etna views, Greek temples, Norman cathedrals — packed.
variants:
- name: sicily_coast_loop
  title: Sicily coastal loop — full island circumnavigation
  headline_tag: Scenic
  is_default: true
  description: |-
    Anti-clockwise from Palermo around Sicily's coast back to Palermo. Mix of coastal flatlands and short inland climbs (no proper mountain sections away from Etna).
  distinguishing_features:
  - Mt Etna views from Catania and Taormina sides
  - Greek temples at Agrigento (UNESCO Valley of the Temples)
  - Norman cathedrals (Monreale, Cefalù) bookend the trip
  - Coastal seafood + Sicilian wine every overnight
  trade_offs:
  - Summer heat brutal — best ridden April/May or September/October
  - Coastal traffic on the SS113 stretches
  - Limited segregated cycle infrastructure
  best_for: |-
    experienced riders wanting a self-contained loop, food + heritage tourists, shoulder-season Mediterranean lovers
