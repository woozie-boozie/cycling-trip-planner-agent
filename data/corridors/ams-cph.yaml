id: ams-cph
label: Amsterdam → Copenhagen
start: Amsterdam
end: Copenhagen
aliases:
- amsterdam
- copenhagen
- eurovelo 7
- eurovelo 12
- ams cph
- amsterdam to copenhagen
description: |-
  The classic North Sea ↔ Baltic crossing. Two variants — the inland EV7/12 hybrid (fastest, ~850 km via Hoorn and Bremen/Hamburg), and the coastal EV12 'proper' (~1,100 km via the Wadden Sea UNESCO coast and Bremerhaven). Both use the Rødby–Puttgarden ferry across the Fehmarn Belt.
variants:
- name: inland_ev7_hybrid
  title: Inland EV7/12 hybrid — fastest
  headline_tag: Direct
  is_default: true
  description: |-
    Cuts inland through Hoorn and Groningen rather than following the coast. The popular 'Amsterdam → Copenhagen tour' that most do — flat, well-signposted, ~9 days for an 80 km/day rider.
  distinguishing_features:
  - Mostly LF / EuroVelo 7 (Sun Route) signage in NL/DE
  - Fewer ferry/coastal complications
  - Bremen + Hamburg for hostel density and food variety
  - Rødby–Puttgarden ferry crossing (~45 min, bikes free)
  trade_offs:
  - Misses the North Sea coast and Wadden Sea UNESCO area
  - Fewer dramatic seaside stretches
  best_for: |-
    riders prioritising distance/day balance and flat, well-signposted infrastructure
