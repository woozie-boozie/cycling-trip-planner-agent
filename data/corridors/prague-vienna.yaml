description: |-
  Prague → Vienna Greenways — the signposted Czech/Austrian cycle corridor. ~400 km via Český Krumlov UNESCO town and the Moravian wine region. 5-6 days at intermediate pace.
variants:
- name: prague_vienna_greenways
  title: Prague → Vienna Greenways — UNESCO + Moravian wine
  headline_tag: Heritage
  is_default: true
  description: |-
    The signposted Greenways route from Prague via Český Krumlov (UNESCO old town), České Budějovice (Budvar beer), and the Moravian wine region (Mikulov, Břeclav) into Vienna.
  distinguishing_features:
  - Český Krumlov UNESCO World Heritage town as the mid-trip stop
  - Moravian wine region — Czech rieslings + small-grower cellars
  - Pilsner / Budvar / Austrian beer geography in one trip
  - Czech sections quieter than the more popular Danube
  trade_offs:
  - Less signposted than the EuroVelos — bring GPX
  - Some Czech sections traffic-shared on regional roads
  best_for: |-
    Central European heritage tourists, wine + beer cyclists, riders wanting quieter alternative to the Danube
