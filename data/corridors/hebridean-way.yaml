description: |-
  Hebridean Way — the Outer Hebrides traverse. ~300 km of single-track machair-edge roads, ferry crossings between islands, Atlantic-edge isolation. Often described as Britain's most beautiful long cycle route.
variants:
- name: hebridean_way
  title: Hebridean Way — south-to-north traverse
  headline_tag: Quiet
  is_default: true
  description: |-
    The signposted Hebridean Way from Vatersay in the south to Stornoway on Lewis, hopping inter-island ferries along the way. Plan around ferry schedules — they're the binding constraint on the trip.
  distinguishing_features:
  - Often-rated UK's most beautiful long-distance cycling route
  - Machair grasslands + white-shell beaches every overnight
  - 'Wildlife: seals, sea eagles, otters — daily sightings'
  - Single-track roads, near-zero traffic outside summer weekends
  trade_offs:
  - Ferry schedules dictate the daily distance
  - Atlantic weather — gales possible even in summer
  - Limited resupply between Lochboisdale and Tarbert
  best_for: |-
    wildlife-focused tourers, photographers, riders wanting genuine remoteness inside the UK
