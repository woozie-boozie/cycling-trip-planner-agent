description: |-
  Way of the Roses — the 170-mile sea-to-sea across northern England's two historic rose counties (Lancashire's red, Yorkshire's white). ~270 km, signposted as NCN 69 + variants, 3-4 days at intermediate pace.
variants:
- name: way_of_the_roses
  title: Way of the Roses — west-to-east
  headline_tag: Heritage
  is_default: true
  description: |-
    The signposted NCN 69 route from Morecambe Bay over the Yorkshire Dales via Settle, Pateley Bridge and York to Bridlington on the North Sea coast. Quieter alternative to the Coast to Coast.
  distinguishing_features:
  - Yorkshire Dales National Park — limestone landscape
  - Historic York with its walls + Minster as a mid-trip stop
  - Quieter than the C2C — less famous, less ridden
  - Sea-to-sea structure with photogenic start and finish piers
  trade_offs:
  - Climbing through the Dales — not flat
  - Pateley Bridge to Ripon is a single long-day option
  best_for: |-
    Yorkshire Dales aficionados, riders wanting a less-crowded alternative to the C2C, York heritage stop
